<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVerse | Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
    <header class="site-header">
        <div class="nav-wrap">
            <a href="index.html" class="brand">
                <img src="TechVerse digital logo design.png" alt="TechVerse Logo">
                <span>TechVerse</span>
            </a>

            <nav class="nav-links" aria-label="Primary navigation">
                <a href="index.html" data-nav-link="home">Home</a>
                <a href="products.html" data-nav-link="products">Products</a>
                <a href="about.html" data-nav-link="about">About</a>
                <a href="contact.html" data-nav-link="contact">Contact</a>
            </nav>

            <div class="nav-actions">
                <div class="auth-area" data-auth-area></div>
                <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobilePanel" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>

        <div class="mobile-panel" id="mobilePanel">
            <div class="mobile-inner">
                <nav class="mobile-links" aria-label="Mobile navigation">
                    <a href="index.html" data-nav-link="home">Home</a>
                    <a href="products.html" data-nav-link="products">Products</a>
                    <a href="about.html" data-nav-link="about">About</a>
                    <a href="contact.html" data-nav-link="contact">Contact</a>
                    <a href="cart.html" data-nav-link="cart">Cart</a>
                    <a href="profile.html" data-nav-link="profile">Profile</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h1>Your profile</h1>
                <p class="auth-subtext">Update your details anytime.</p>

                <form class="auth-form" id="profileForm">
                    <label class="auth-label">
                        Name
                        <input class="auth-input" type="text" name="name" autocomplete="name">
                    </label>
                    <label class="auth-label">
                        Email
                        <input class="auth-input" type="email" name="email" autocomplete="email" disabled>
                    </label>
                    <label class="auth-label">
                        Phone
                        <input class="auth-input" type="tel" name="phone" autocomplete="tel">
                    </label>
                    <label class="auth-label">
                        Address
                        <textarea class="auth-input auth-textarea" name="address" autocomplete="street-address" rows="3"></textarea>
                    </label>

                    <button class="auth-submit" type="submit">Save changes</button>
                    <p class="auth-success" id="profileSuccess" aria-live="polite"></p>
                    <p class="auth-error" id="profileError" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Neon Gadgets. All rights reserved.</p>
        </div>
    </footer>

    <script src="site.js"></script>
    <script src="auth-client.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("profileForm");
            const errEl = document.getElementById("profileError");
            const okEl = document.getElementById("profileSuccess");

            const nameEl = form.elements.namedItem("name");
            const emailEl = form.elements.namedItem("email");
            const phoneEl = form.elements.namedItem("phone");
            const addrEl = form.elements.namedItem("address");

            let me = null;
            try {
                me = await window.TechVerseAuth.me();
            } catch {}
            if (!me) {
                window.location.href = "login.html";
                return;
            }

            nameEl.value = me.name || "";
            emailEl.value = me.email || "";
            phoneEl.value = me.phone || "";
            addrEl.value = me.address || "";

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errEl.textContent = "";
                okEl.textContent = "";

                const payload = {
                    name: nameEl.value,
                    phone: phoneEl.value,
                    address: addrEl.value
                };

                try {
                    await window.TechVerseAuth.fetchJson("/api/profile", {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    okEl.textContent = "Saved.";
                } catch (err) {
                    errEl.textContent = err.message || "Update failed.";
                }
            });
        });
    </script>
</body>
</html>
