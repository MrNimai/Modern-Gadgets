<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVerse | Profile</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="profile">
    <header class="site-header">
        <div class="nav-wrap">
            <a href="../index.html" class="brand">
                <img src="../images/TechVerse digital logo design.png" alt="TechVerse Logo">
                <span>TechVerse</span>
            </a>

            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../index.html" data-nav-link="home">Home</a>
                <a href="products.html" data-nav-link="products">Products</a>
                <a href="about.html" data-nav-link="about">About</a>
                <a href="contact.html" data-nav-link="contact">Contact</a>
            </nav>

            <div class="nav-actions">
                <div class="auth-area" data-auth-area></div>
                <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobilePanel" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>

        <div class="mobile-panel" id="mobilePanel">
            <div class="mobile-inner">
                <nav class="mobile-links" aria-label="Mobile navigation">
                    <a href="../index.html" data-nav-link="home">Home</a>
                    <a href="products.html" data-nav-link="products">Products</a>
                    <a href="about.html" data-nav-link="about">About</a>
                    <a href="contact.html" data-nav-link="contact">Contact</a>
                    <a href="cart.html" data-nav-link="cart">Cart</a>
                    <a href="profile.html" data-nav-link="profile">Profile</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h1>Your profile</h1>
                <p class="auth-subtext">Update your details anytime.</p>

                <form class="auth-form" id="profileForm">
                    <label class="auth-label">
                        Name
                        <input class="auth-input" type="text" name="name" autocomplete="name">
                    </label>
                    <label class="auth-label">
                        Email
                        <input class="auth-input" type="email" name="email" autocomplete="email" disabled>
                    </label>
                    <label class="auth-label">
                        Phone
                        <input class="auth-input" type="tel" name="phone" autocomplete="tel">
                    </label>
                    <label class="auth-label">
                        Address
                        <textarea class="auth-input auth-textarea" name="address" autocomplete="street-address" rows="3"></textarea>
                    </label>

                    <button class="auth-submit" type="submit">Save changes</button>
                    <p class="auth-success" id="profileSuccess" aria-live="polite"></p>
                    <p class="auth-error" id="profileError" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-wrap">
            <div class="footer-brand">
                <img src="../images/My Logo.png" alt="Neon Gadgets Logo" class="footer-logo">
                <div>
                    <strong>Neon Gadgets</strong>
                    <p>Future-ready gadgets with a premium neon vibe.</p>
                </div>
            </div>

            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="social-links" aria-label="Social media links">
                <a href="#" class="social-link" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 8h2V4h-2.2C11.7 4 10 5.7 10 7.8V10H8v4h2v6h4v-6h2.2l.8-4H14V8Z"></path>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="4" y="4" width="16" height="16" rx="4"></rect>
                        <circle cx="12" cy="12" r="3.5"></circle>
                        <circle cx="17.2" cy="6.8" r="0.8"></circle>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Twitter">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22 5.9c-.7.3-1.5.5-2.3.6.8-.5 1.4-1.2 1.7-2.2-.8.5-1.7.8-2.6 1a4 4 0 0 0-6.9 3.6A11.3 11.3 0 0 1 3.7 4.8a4 4 0 0 0 1.2 5.3c-.6 0-1.2-.2-1.7-.5 0 1.9 1.3 3.5 3.1 3.9-.3.1-.7.1-1 .1-.2 0-.5 0-.7-.1.5 1.6 2 2.8 3.8 2.8A8 8 0 0 1 3 18.1 11.3 11.3 0 0 0 9.1 20c7.3 0 11.3-6.1 11.3-11.3v-.5c.8-.6 1.4-1.3 1.9-2.2Z"></path>
                    </svg>
                </a>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Neon Gadgets. All rights reserved.</p>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="../js/site.js"></script>
    <script src="../js/auth-client.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("profileForm");
            const errEl = document.getElementById("profileError");
            const okEl = document.getElementById("profileSuccess");

            const nameEl = form.elements.namedItem("name");
            const emailEl = form.elements.namedItem("email");
            const phoneEl = form.elements.namedItem("phone");
            const addrEl = form.elements.namedItem("address");

            let me = null;
            try {
                me = await window.TechVerseAuth.me();
            } catch {}
            if (!me) {
                window.location.href = "login.html";
                return;
            }

            nameEl.value = me.name || "";
            emailEl.value = me.email || "";
            phoneEl.value = me.phone || "";
            addrEl.value = me.address || "";

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errEl.textContent = "";
                okEl.textContent = "";

                const payload = {
                    name: nameEl.value,
                    phone: phoneEl.value,
                    address: addrEl.value
                };

                try {
                    await window.TechVerseAuth.fetchJson("/api/profile", {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    okEl.textContent = "Saved.";
                } catch (err) {
                    errEl.textContent = err.message || "Update failed.";
                }
            });
        });
    </script>
</body>
</html>
