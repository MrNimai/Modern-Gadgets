<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVerse | Login</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="login">
    <header class="site-header">
        <div class="nav-wrap">
            <a href="../index.html" class="brand">
                <img src="../images/TechVerse digital logo design.png" alt="TechVerse Logo">
                <span>TechVerse</span>
            </a>

            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../index.html" data-nav-link="home">Home</a>
                <a href="products.html" data-nav-link="products">Products</a>
                <a href="about.html" data-nav-link="about">About</a>
                <a href="contact.html" data-nav-link="contact">Contact</a>
            </nav>

            <div class="nav-actions">
                <div class="auth-area" data-auth-area></div>
                <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobilePanel" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>

        <div class="mobile-panel" id="mobilePanel">
            <div class="mobile-inner">
                <nav class="mobile-links" aria-label="Mobile navigation">
                    <a href="../index.html" data-nav-link="home">Home</a>
                    <a href="products.html" data-nav-link="products">Products</a>
                    <a href="about.html" data-nav-link="about">About</a>
                    <a href="contact.html" data-nav-link="contact">Contact</a>
                    <a href="cart.html" data-nav-link="cart">Cart</a>
                    <a href="login.html" data-nav-link="login">Login</a>
                    <a href="signup.html" data-nav-link="signup">Sign up</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h1>Welcome back</h1>
                <p class="auth-subtext">Login to manage your profile.</p>

                <form class="auth-form" id="loginForm">
                    <label class="auth-label">
                        Email
                        <input class="auth-input" type="email" name="email" autocomplete="email" required>
                    </label>
                    <label class="auth-label">
                        Password
                        <input class="auth-input" type="password" name="password" autocomplete="current-password" required>
                    </label>

                    <button class="auth-submit" type="submit">Login</button>
                    <p class="auth-hint">
                        New here? <a href="signup.html">Create an account</a>
                    </p>
                    <p class="auth-error" id="loginError" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Neon Gadgets. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/site.js"></script>
    <script src="../js/auth-client.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("loginForm");
            const errEl = document.getElementById("loginError");

            try {
                const me = await window.TechVerseAuth.me();
                if (me) window.location.href = "profile.html";
            } catch {}

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errEl.textContent = "";
                const fd = new FormData(form);
                const payload = {
                    email: fd.get("email"),
                    password: fd.get("password")
                };

                try {
                    await window.TechVerseAuth.fetchJson("/api/auth/login", {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    window.location.href = "profile.html";
                } catch (err) {
                    errEl.textContent = err.message || "Login failed.";
                }
            });
        });
    </script>
</body>
</html>
